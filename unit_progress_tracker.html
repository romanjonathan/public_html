<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Unit Progress Tracker</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; padding: 0.75rem; background: #fff; color: #111; font-size: 16px; }
.unit-card { background: #fff; border: 1px solid #ccc; border-radius: 12px; padding: 0.75rem 1rem; margin-bottom: 6px; display: flex; align-items: center; gap: 10px; }
.unit-card.active { border-color: #378ADD; }
.unit-card.done { opacity: 0.6; }
.unit-label { font-size: 20px; font-weight: 600; min-width: 36px; }
.timer-display { font-size: 22px; font-weight: 500; font-family: monospace; min-width: 76px; }
.status-badge { font-size: 14px; padding: 4px 10px; border-radius: 8px; min-width: 72px; text-align: center; }
.badge-idle { background: #e8e6df; color: #444; }
.badge-active { background: #cde4f8; color: #0d4a8a; }
.badge-paused { background: #faeeda; color: #6b3c06; }
.badge-done { background: #d4edbd; color: #2a5208; }
.actions { margin-left: auto; display: flex; gap: 8px; }
button.action-btn { border: 1px solid #bbb; background: transparent; border-radius: 8px; padding: 10px 20px; font-size: 16px; cursor: pointer; }
button.action-btn:hover { background: #f0f0f0; }
button.action-btn:disabled { opacity: 0.35; cursor: default; }
button.action-btn.primary { background: #cde4f8; color: #0d4a8a; border-color: #378ADD; }
.summary { background: #efefef; border-radius: 12px; padding: 0.75rem 1rem; margin-top: 1rem; }
.summary-title { font-size: 14px; color: #444; margin-bottom: 8px; font-weight: 600; }
.summary-row { display: flex; justify-content: space-between; font-size: 16px; padding: 5px 0; border-bottom: 1px solid #ccc; }
.summary-row:last-child { border-bottom: none; }
.summary-row .time { font-family: monospace; color: #333; }
.add-row { display: flex; gap: 8px; margin-bottom: 0.75rem; align-items: center; }
.add-row input { border: 1px solid #bbb; border-radius: 8px; padding: 10px 12px; font-size: 16px; width: 100px; }
</style>
</head>
<body>
<div class="tracker">
  <div class="add-row">
    <input type="number" id="new-unit-num" placeholder="Unit #" min="1" />
    <button class="action-btn" onclick="addUnit()">+ Add unit</button>
  </div>
  <div id="units-container"></div>
  <div class="summary" id="summary" style="display:none;">
    <div class="summary-title">Session summary</div>
    <div id="summary-rows"></div>
  </div>
</div>

<script>
const units = [];
let tickInterval = null;

function fmt(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const h = Math.floor(m / 60);
  return h > 0
    ? h + 'h ' + String(m % 60).padStart(2,'0') + 'm'
    : String(m).padStart(2,'0') + ':' + String(s % 60).padStart(2,'0');
}

function addUnit(num) {
  const val = num || parseInt(document.getElementById('new-unit-num').value);
  if (!val || isNaN(val)) return;
  if (units.find(u => u.num === val)) return;
  units.push({ num: val, state: 'idle', elapsed: 0, startedAt: null });
  units.sort((a,b) => a.num - b.num);
  document.getElementById('new-unit-num').value = '';
  render();
}

function startUnit(num) {
  const u = units.find(u => u.num === num);
  if (!u || u.state === 'done') return;
  units.forEach(x => { if (x.state === 'active') pauseUnit(x.num); });
  u.state = 'active';
  u.startedAt = Date.now();
  if (!tickInterval) tickInterval = setInterval(tick, 1000);
  render();
}

function pauseUnit(num) {
  const u = units.find(u => u.num === num);
  if (!u || u.state !== 'active') return;
  u.elapsed += Date.now() - u.startedAt;
  u.startedAt = null;
  u.state = 'paused';
  render();
}

function finishUnit(num) {
  const u = units.find(u => u.num === num);
  if (!u || u.state === 'done') return;
  if (u.state === 'active') u.elapsed += Date.now() - u.startedAt;
  u.startedAt = null;
  u.state = 'done';
  render();
}

function tick() {
  const hasActive = units.some(u => u.state === 'active');
  if (!hasActive) { clearInterval(tickInterval); tickInterval = null; }
  render();
}

function getElapsed(u) {
  if (u.state === 'active' && u.startedAt) return u.elapsed + (Date.now() - u.startedAt);
  return u.elapsed;
}

function render() {
  const container = document.getElementById('units-container');
  container.innerHTML = units.map(u => {
    const elapsed = getElapsed(u);
    const badgeClass = { idle: 'badge-idle', active: 'badge-active', paused: 'badge-paused', done: 'badge-done' }[u.state];
    const badgeText = { idle: 'not started', active: 'in progress', paused: 'paused', done: 'done' }[u.state];
    const cardClass = u.state === 'active' ? 'active' : u.state === 'done' ? 'done' : '';
    return `<div class="unit-card ${cardClass}">
      <span class="unit-label">${u.num}</span>
      <span class="timer-display">${fmt(elapsed)}</span>
      <span class="status-badge ${badgeClass}">${badgeText}</span>
      <div class="actions">
        ${u.state === 'idle' || u.state === 'paused'
          ? `<button class="action-btn primary" onclick="startUnit(${u.num})">Start</button>`
          : u.state === 'active'
          ? `<button class="action-btn" onclick="pauseUnit(${u.num})">Pause</button>`
          : ''}
        <button class="action-btn" onclick="finishUnit(${u.num})" ${u.state === 'done' ? 'disabled' : ''}>Finish</button>
      </div>
    </div>`;
  }).join('');

  const done = units.filter(u => u.state === 'done');
  const summary = document.getElementById('summary');
  if (done.length > 0) {
    summary.style.display = 'block';
    document.getElementById('summary-rows').innerHTML = done.map(u =>
      `<div class="summary-row"><span>${u.num}</span><span class="time">${fmt(u.elapsed)}</span></div>`
    ).join('');
  } else {
    summary.style.display = 'none';
  }
}

[1, 2, 3].forEach(n => addUnit(n));
</script>
</body>
</html>
